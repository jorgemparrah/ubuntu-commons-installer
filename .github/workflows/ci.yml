          - case: ulauncher-ppa
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "L01"
            cmd: bash tests/docker/test_ulauncher_ppa.sh
          - case: cursor-apt-repo
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "C01"
            cmd: bash tests/docker/test_cursor_apt_repo.sh
          - case: vscode-apt-repo
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "V01"
            cmd: bash tests/docker/test_vscode_apt_repo.sh
          - case: docker-apt-repo
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "D01"
            cmd: bash tests/docker/test_docker_apt_repo.sh
          - case: installer-cli
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "I11"
            cmd: bash tests/test_installer_cli.sh
          - case: apt-helpers
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "I12"
            cmd: bash tests/test_apt_helpers.sh
          - case: cmatrix-installer
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "I13"
            cmd: bash tests/test_cmatrix_installer.sh
          - case: ranger-installer
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "I14"
            cmd: bash tests/test_ranger_installer.sh
          - case: terminator-installer
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "I15"
            cmd: bash tests/test_terminator_installer.sh
          - case: flameshot-installer
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "I16"
            cmd: bash tests/test_flameshot_installer.sh
          - case: tools-registry
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "I17"
            cmd: bash tests/test_tools_registry.sh
          - case: split-installers-contract
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "I18"
            cmd: bash tests/test_split_installers_contract.sh
          - case: tools-catalog-docs-consistency
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "I19"
            cmd: bash tests/test_tools_catalog_docs_consistency.sh
          - case: ulauncher-installer
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "I20"
            cmd: bash tests/test_ulauncher_installer.sh
          - case: obs-studio-installer
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "I28"
            cmd: bash tests/test_obs_studio_installer.sh
          - case: tools-catalog-setup-js-consistency
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "I21"
            cmd: bash tests/test_tools_catalog_setup_js_consistency.sh
          - case: tools-catalog-ubuntu-compatibility-consistency
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "I24"
            cmd: bash tests/test_tools_catalog_ubuntu_compatibility_consistency.sh
          - case: snap-installers-full-contract
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "I22"
            cmd: bash tests/test_snap_installers_full_contract.sh
          - case: deb-direct-full-contract
            variant: base
            dockerfile: tests/docker/Dockerfile
