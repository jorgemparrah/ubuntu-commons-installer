name: CI

# Gate de calidad automatizado (Hito 10, ver docs/ROADMAP.md y
# docs/adr/0026-adelantar-hito-10-ci-antes-que-hito-9.md).
#
# La matriz de este workflow refleja exactamente docs/TEST_CASES.md — esa
# tabla sigue siendo la fuente de verdad; si agregas un caso nuevo ahí,
# agrega también su entrada acá (y en tests/docker/build-and-test-all.sh,
# que sigue siendo el punto de entrada equivalente para correr todo en
# local). No se elimina build-and-test-all.sh: sigue siendo útil para
# depurar un caso puntual sin depender de CI.

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

jobs:
  lint:
    name: Sintaxis y estilo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: bash -n
        run: |
          bash -n setup.sh
          find scripts tests -type f -name '*.sh' -exec bash -n {} \;

      - name: ShellCheck
        # -S error: el proyecto nunca corrió ShellCheck en CI hasta ahora
        # (localmente no estaba disponible, ver AGENT.md sección 18). Su
        # primera corrida real encontró varios hallazgos 'warning'/'info'
        # preexistentes (SC2155, SC2034, SC1091, SC2016, SC2028, SC2162) en
        # código que no forma parte de este cierre del Hito 7. Se gatea
        # solo por 'error' para no bloquear este PR con una limpieza de
        # estilo no relacionada y de mayor alcance; esa limpieza queda
        # pendiente como deuda técnica (ver docs/ROADMAP.md).
        run: |
          shellcheck -S error setup.sh scripts/lib/*.sh scripts/bootstrap/*.sh \
            scripts/diagnostics/*.sh scripts/migrations/*.sh

      - name: node --check
        run: |
          node --check setup.js
          node --check scripts/lib/status_contract.js

  docker-matrix:
    # Un caso de prueba por job (docs/TECHNICAL_REVIEW.md, pedido explícito
    # del dueño del proyecto el 2026-07-19): antes varios scripts corrían
    # agrupados dentro de un mismo job, lo que obligaba a leer el log
    # completo del job para saber cuál de los 2-3 casos agrupados había
    # fallado. Ahora cada entrada de la matriz ejecuta un único caso, con
    # su propio Dockerfile asignado en `include`. La imagen "base" se
    # reconstruye en cada job (son ~24 de los 27 casos), pero desde el
    # cierre técnico de 2026-07-18 (hallazgo A5) sus capas se cachean vía
    # GitHub Actions cache (docker/build-push-action, cache-from/cache-to:
    # type=gha) con un scope compartido por versión de Ubuntu — así los 24
    # casos que comparten la imagen base reutilizan sus capas en vez de
    # reconstruirlas desde cero cada vez.
    name: ${{ matrix.ubuntu }} - ${{ matrix.case }} 
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        case:
          - router
          - doctor
          - backup
          - backup-move-dir
          - migrations
          - install-nodejs-legacy
          - system-update-contract
          - mongodb-compass-download
          - kernel-hwe-fallback
          - chrome-arch-check
          - snap-installers-contract
          - status-mapping
          - bootstrap-mise-no-nvm
          - nvm-to-mise-apply
          - nvm-to-mise-fault-injection
          - runtime-status
          - kubectl-via-mise
          - yarn-via-mise
          - zsh-personalization
          - ulauncher-ppa
          - cursor-apt-repo
          - vscode-apt-repo
          - docker-apt-repo
          - installer-cli
          - apt-helpers
          - cmatrix-installer
          - ranger-installer
          - terminator-installer
          - flameshot-installer
          - tools-registry
          - split-installers-contract
          - tools-catalog-docs-consistency
          - ulauncher-installer
          - obs-studio-installer
          - tools-catalog-setup-js-consistency
          - tools-catalog-ubuntu-compatibility-consistency
          - snap-installers-full-contract
          - deb-direct-full-contract
          - terminal-apps-apt-simple-contract
          - ghostty-installer
          - wezterm-apt-repo
          - gh-via-mise
          - curl-script-contract
          - nvm-single
          - nvm-multi
          - nvm-mise-preexisting
        ubuntu: ["24.04", "26.04"]
        include:
          - case: router
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "Nivel 1"
            cmd: bash tests/test_router.sh
          - case: doctor
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "Nivel 1"
            cmd: bash tests/test_doctor.sh
          - case: backup
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "Nivel 1"
            cmd: bash tests/test_backup.sh
          - case: backup-move-dir
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "Nivel 1"
            cmd: bash tests/test_backup_move_dir.sh
          - case: migrations
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "Nivel 1"
            cmd: bash tests/test_migrations.sh
          - case: install-nodejs-legacy
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "Nivel 1"
            cmd: bash tests/test_install_nodejs_legacy.sh
          - case: system-update-contract
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "I05"
            cmd: bash tests/test_system_update_contract.sh
          - case: mongodb-compass-download
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "I07"
            cmd: bash tests/test_mongodb_compass_download.sh
          - case: kernel-hwe-fallback
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "I08"
            cmd: bash tests/test_kernel_hwe_fallback.sh
          - case: chrome-arch-check
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "I09"
            cmd: bash tests/test_chrome_arch_check.sh
          - case: snap-installers-contract
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "I10"
            cmd: bash tests/test_snap_installers_contract.sh
          - case: status-mapping
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "Nivel 1"
            cmd: node tests/test_status_mapping.js
          - case: bootstrap-mise-no-nvm
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "BOOT01"
            cmd: bash tests/docker/test_bootstrap_mise_no_nvm.sh
          - case: nvm-to-mise-apply
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "M01,M02,M05,M08"
            cmd: bash tests/docker/test_nvm_to_mise_apply.sh
          - case: nvm-to-mise-fault-injection
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "M07"
            cmd: bash tests/docker/test_nvm_to_mise_fault_injection.sh
          - case: runtime-status
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "R01-R06"
            cmd: bash tests/docker/test_runtime_status.sh
          - case: kubectl-via-mise
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "K01"
            cmd: bash tests/docker/test_kubectl_via_mise.sh
          - case: yarn-via-mise
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "Y01"
