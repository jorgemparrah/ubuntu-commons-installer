          - case: wezterm-apt-repo
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "W01"
            cmd: bash tests/docker/test_wezterm_apt_repo.sh
          - case: gh-via-mise
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "G01"
            cmd: bash tests/docker/test_gh_via_mise.sh
          - case: curl-script-contract
            variant: base
            dockerfile: tests/docker/Dockerfile
            ids: "I27"
            cmd: bash tests/test_curl_script_contract.sh
          - case: nvm-single
            variant: nvm-single
            dockerfile: tests/docker/Dockerfile.nvm-single
            ids: "M03,M05,M08"
            cmd: bash tests/docker/test_nvm_to_mise_prebaked.sh
          - case: nvm-multi
            variant: nvm-multi
            dockerfile: tests/docker/Dockerfile.nvm-multi
            ids: "M04,M05,M08"
            cmd: bash tests/docker/test_nvm_to_mise_prebaked.sh
          - case: nvm-mise-preexisting
            variant: nvm-mise-preexisting
            dockerfile: tests/docker/Dockerfile.nvm-mise-preexisting
            ids: "M06"
            cmd: bash tests/docker/test_nvm_to_mise_mise_preexisting.sh
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Docker Buildx (necesario para cache-from/cache-to type=gha)
        uses: docker/setup-buildx-action@v3

      - name: Construir imagen base (Ubuntu ${{ matrix.ubuntu }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tests/docker/Dockerfile
          build-args: UBUNTU_VERSION=${{ matrix.ubuntu }}
          tags: ubuntu-workstation-test:${{ matrix.ubuntu }}
          load: true
          cache-from: type=gha,scope=base-${{ matrix.ubuntu }}
          cache-to: type=gha,mode=max,scope=base-${{ matrix.ubuntu }}

      # 'docker build' clásico, NO docker/build-push-action: esta imagen usa
      # 'FROM ubuntu-workstation-test:${UBUNTU_VERSION}', la imagen base que
      # el paso anterior acaba de cargar en el daemon local (load: true). El
      # driver 'docker-container' de buildx (necesario para cache-from/
      # cache-to: type=gha) está aislado del daemon local y no ve esa
      # imagen — intenta resolverla contra Docker Hub y falla. El build de
      # la variante es liviano (solo agrega NVM sobre la base) y específico
      # de cada job, así que no pierde el beneficio real del cache de GHA,
      # que sigue aplicando a la imagen base (compartida por los 24 casos
      # que la usan).
      - name: Construir variante ${{ matrix.variant }}
        if: matrix.variant != 'base'
        run: |
          docker build --build-arg UBUNTU_VERSION=${{ matrix.ubuntu }} \
            -t ubuntu-workstation-test-${{ matrix.variant }}:${{ matrix.ubuntu }} \
            -f ${{ matrix.dockerfile }} .

      - name: Correr caso ${{ matrix.ids }} (${{ matrix.case }})
        run: |
          if [ "${{ matrix.variant }}" = "base" ]; then
            TAG="ubuntu-workstation-test:${{ matrix.ubuntu }}"
          else
            TAG="ubuntu-workstation-test-${{ matrix.variant }}:${{ matrix.ubuntu }}"
          fi
          docker run --rm "${TAG}" ${{ matrix.cmd }}
